"}, {"url": "media/05_agent_erabikata/05.webp?v=628d14eb", "v": "628d14eb"}, {"url": "media/05_agent_erabikata/06.webp?v=c95ad3a1", "v": "c95ad3a1"}]}, {"id": "06_beforeafter", "caption_body": "新卒2年目で、病棟の看護師を辞めました。\n\n小さい頃からずっと憧れてた仕事。\n実習も国家試験も必死に乗り越えて、やっと掴んだ資格でした。\n\n急性期の病棟で働き始めて、大変だけどやりがいも感じてた。\nでも心のどこかでずっと引っかかってて。\n\n「この生活、ずっと続けるのかな」って。\n\n夜勤のたびに崩れる生活リズム、\n気づいたら暴飲暴食が当たり前になってて、\n去年だけで熱を出したのも数えきれないくらい。\n喉が痛くて水も飲めない日もあって、\n薬に頼りながら働く毎日で、心も体もすり減ってた。\n\n辞めたいって伝えたときは\n「もったいない」「次どうするの」って\nたくさん引き止められたけど、\n\n患者さんの「ありがとう」で頑張れるのも、\n一時的なものだって気づいたんです。\n\n自分を壊してまで人のケアを続けるのは違うなって。\n\n資格はどうしても活かしたくて、美容看護師に転職を決意。\n最初は大手の転職サイトに登録して、\n美容クリニックを何社か受けたけど、全部お見送りでした。\n\n正直あの時はけっこう落ち込んで。\n\nそんな時、先に美容看護師になってた友達に相談したら、\n「美容特化のところの方が良かったよ」って教えてくれて、\n半信半疑で登録してみたんです。\n\n担当してくれたのは元看護師の方で、\n条件に合う求人紹介から面接対策まで、\nすごく親身にサポートしてくれて。\n\nそのおかげで、1ヶ月くらいで内定をもらえました。\n\n今は髪色もネイルも自由で、\n夜勤も残業もなくて、\nプライベートの時間もちゃんと取れてます。\n\nもし今、私と同じように悩んでる人がいたら、\n無理せず一度相談だけでもしてみてほしいです。", "hashtags": ["#看護師", "#看護師の日常", "#仕事辞めたい", "#看護師転職"], "music": null, "pinned_comment": null, "date_label": null, "bg": "black", "title": "転職前後Before/After　マスク姿→美容ナース姿", "ref_label": "いいね 71,600 ・ 保存 6,907(2025-12-02)", "type": "image", "images": [{"url": "media/06_beforeafter/01.webp?v=ea22eeab", "v": "ea22eeab"}]}, {"id": "07_fusen_memo", "caption_body": "看護師なのに残業•夜勤もないしネイル自由💅\n本当に転職してよかったです🤍✨", "hashtags": ["#美容ナース", "#美容看護師", "#看護師", "#看護師の日常", "#看護師転職"], "music": null, "pinned_comment": null, "date_label": null, "bg": "black", "title": "付箋メモ　お局トラウマ→美容ナースで解消", "ref_label": "いいね 52,400 ・ 保存 8,967 ・ コメント 97(2025-11-25)", "type": "image", "images": [{"url": "media/07_fusen_memo/01.webp?v=92420442", "v": "92420442"}, {"url": "media/07_fusen_memo/02.webp?v=b5a35c54", "v": "b5a35c54"}, {"url": "media/07_fusen_memo/03.webp?v=9e5f37c4", "v": "9e5f37c4"}, {"url": "media/07_fusen_memo/04.webp?v=829382af", "v": "829382af"}, {"url": "media/07_fusen_memo/05.webp?v=43541842", "v": "43541842"}, {"url": "media/07_fusen_memo/06.webp?v=3d68648a", "v": "3d68648a"}]}, {"id": "08_otsubone_line", "caption_body": "看護師を辞めて半年くらい経った頃、\n前の病棟にいたお局から急にLINEが来ました。\n\n「最近どう?」みたいな軽い感じだったけど、\n内容を見て思わず二度見しちゃって。\n\nあの人、絶対自分の非を認めないし、\n弱さなんて見せないタイプだったから余計に。\n\n正直、私が体調崩して辞めることになった一番の原因は\nこの人だったんですよね。\n\n「患者さんのために」が口癖なのに、\n自分の機嫌で現場の空気を全部決めるような人で。\n\nミスしそうになった時も\n「誰かが物の場所変えたから」って人のせいにするのに、\n私が少し手間取ると\n「これだから最近の子は」ってみんなの前で言う。\n\n「先輩、何か手伝いますか?」って聞いたら\n「手伝うじゃなくて、できることありますかでしょ」\nって言い直させられて、\n素直に聞き直したら\n「自分で考えて」\n\n……聞いてるのに。\n\n一番きつかったのは、バタバタの夕方に\n「今日は予定あるから帰るね、経験だと思って」\nって自分の受け持ち患者の記録まで置いていかれた日。\n\n結局22時まで一人で残業して、\n翌朝フラフラの私に\n「まだ準備できてないの?」って言ってきた人が、\n「ありがとう」も「ごめんね」も\n一度も言ったことなかった人からの、半年ぶりの連絡。\n\n開いてみたら、\n「若手がどんどん辞めて夜勤増えてキツくて」\n「私も資格活かして転職しようかな」\n「でも美容ってやりがいないんでしょ?」\n\n…相変わらずだなと思いつつ、\nなんとなく分かっちゃったんです。\n\nこれ、今の状況がしんどくて、\n本当は私のやり方を知りたいんだろうなって。\n\nだから普通に返しました。\n\n「私は残業もほぼないし夜勤もなくて、\n月に1回旅行行けるくらい余裕あります。\nネイルも髪色も自由なので、\n今すごく気に入ってますよ」\n\n「へー。でも臨床経験浅いとブラックなとこしかないでしょ」\n\n「美容特化の転職エージェントがあって、\n条件に合う求人とか面接対策まで\nちゃんとサポートしてもらえたので、\n1ヶ月くらいで理想の職場決まりました」\n\n「そういうのってどうやって見つけるの」\n\n……素直に聞けないところ、変わってないなと思って、\n「気になったら調べてみてください」とだけ送って閉じました。\n\nもし今、当時の私と同じように\n限界を感じてる人がいたら、\n無理せず一度相談だけでもしてみてほしいです。", "hashtags": [], "music": null, "pinned_comment": null, "date_label": null, "bg": "black", "title": "お局LINEスクショ　闇バイトみたいな職場から脱出", "ref_label": "いいね 36,200 ・ 保存 1,302 ・ コメント 109(2026-03-20)", "type": "image", "images": [{"url": "media/08_otsubone_line/01.webp?v=29e697e6", "v": "29e697e6"}]}, {"id": "09_ichinichi_routine", "caption_body": "", "hashtags": ["#美容看護師", "#看護師", "#看護師の日常", "#美容クリニック", "#看護師転職"], "music": null, "pinned_comment": null, "date_label": null, "bg": "black", "title": "美容ナースの一日　最高すぎてしぬ‼", "ref_label": "いいね 695 ・ 保存 114 ・ コメント 24(2026-07-08)", "type": "image", "images": [{"url": "media/09_ichinichi_routine/01.webp?v=f9ba0f03", "v": "f9ba0f03"}, {"url": "media/09_ichinichi_routine/02.webp?v=c0dac767", "v": "c0dac767"}, {"url": "media/09_ichinichi_routine/03.webp?v=dcd466fb", "v": "dcd466fb"}, {"url": "media/09_ichinichi_routine/04.webp?v=6ba5d834", "v": "6ba5d8

<script>window.FEED = /*__FEED_DATA__*/{"account": {"handle": "mio_iryou_note", "display_name": "みお🏥美容看護師", "bio": ["都内の美容看護師🏥", "病棟3年目→美容クリニックへ転職", "👇私がお世話になった転職相談👇"], "link_label": "", "avatar": "assets/avatar_persona.webp?v=3bbea24d", "default_music": "オリジナル楽曲", "default_pinned_comment": null, "posting_note": "TikTok Studio webまたはスマホ「フォトモード」で1枚目=表紙の並び順のまま選択→キャプションをℹ️シートからコピペ→BGMはアプリ内トレンド音源→投稿。 ※投稿順=A-01→C-03→B-01→C-05→B-02の5本(A-02は投稿対象外)。iPhoneでの手順は /iphone/ ページ参照。", "_account_pivot_note": "2026-07-19: 旧「元病棟ナース📋転職ラボ」(三人称キュレーター案)はFable裁定(ACCOUNT_DESIGN_2026-07-16.md §1-1)により一人称ペルソナ「みお」案へ置き換え済み。avatar=persona_iconはbuild.pyがproduction/account/icon_back_2.pngを解決する予約値。"}, "posts": [{"id": "A-01", "caption_body": "夜勤も残業もなくなって、休みの日に予定を詰め込めるようになりました。転職して本当に良かったです🤍✨", "hashtags": ["#美容看護師", "#看護師転職", "#看護師の日常", "#看護師あるある", "#美容クリニック"], "music": null, "pinned_comment": null, "date_label": null, "bg": "black", "title": "美容クリニックに転職して変わった勤務スタイル6選", "ref_label": "参考元: rank2(biyounurse_tenshoku id7576625520595504402・like52,400/save8,967)。差分: 見出し「勝ち組すぎるよ展」は使わず独自の勤務条件見出しに変更、項目は全て新規作成。キャプションも今回rank2型の短文体験談へ差し替え(旧=ハッシュタグのみ・rank4型)。", "batch_label": "Week1 ・ A-01", "status_note": null, "type": "image", "images": [{"url": "media/A-01/01.webp?v=9da09de6", "v": "9da09de6"}, {"url": "media/A-01/02.webp?v=7864609f", "v": "7864609f"}, {"url": "media/A-01/03.webp?v=fcd2af24", "v": "fcd2af24"}, {"url": "media/A-01/04.webp?v=f4ade3a0", "v": "f4ade3a0"}, {"url": "media/A-01/05.webp?v=ed6e49d4", "v": "ed6e49d4"}, {"url": "media/A-01/06.webp?v=c3a5547e", "v": "c3a5547e"}, {"url": "media/A-01/07.webp?v=9b262089", "v": "9b262089"}]}, {"id": "C-03", "caption_body": "夜勤明けの、あの感覚。\n抜け殻のような身体を引きずって家に帰る日々を、当たり前だと思っていました。\n\n足はいつもパンパンで、靴を脱いだ瞬間にジンとした痛みだけが残る。\n生理周期もいつの間にかバラバラになっていて、婦人科で「不規則な生活が原因かもしれません」と言われたときは、さすがに驚きました。\n記録をつけている最中、手がかすかに震えていることに気づいた日もあって、「これって普通なのかな」と、ふと怖くなったのを覚えています。\nそれでも、まだ大丈夫だと思い込もうとしていました。\n患者さんの前では平気なふりをしていたのに、更衣室で一人になった途端に涙腺が緩む日が増えていきました。\nそう気づいたんです。身体を壊してまでこの働き方にしがみつく理由は、もう自分にはないんだって。\n正直、半分諦めかけていたんです。\n\n大手の看護師転職サイトに2社登録しましたが希望と合わず、美容クリニックを7社受けて7社とも不採用という時期もありました。\nそんな時、友達に紹介してもらった美容特化の転職サイトに半信半疑で登録し、担当の方に親身に相談に乗ってもらいながら、正味3週間ほどで内定をいただきました。\n\n今は残業も夜勤もなく、帰宅後に自分の時間ができています。\n習い事を始めたり、友達と予定を合わせたりできるようになって、生理周期も落ち着いてきています。\nあの頃の身体の重さを、今はもう感じていません🥹🤍", "hashtags": ["#看護師", "#看護師の日常", "#看護師転職", "#美容看護師"], "music": null, "pinned_comment": null, "date_label": null, "bg": "black", "title": "夜勤明けの身体感覚(むくみ・生理不順・手の震え) Before/After長文", "ref_label": "参考元: rank1(biyounurse_tenshoku id7579172163236777223・like71,600/save6,907)。差分: Before/After構造は踏襲しつつ、身体感覚語彙(むくみ・生理不順・手の震え)の密度を主役にした新規記述。", "batch_label": "Week1 ・ C-03", "status_note": null, "type": "image", "images": [{"url": "media/C-03/01.webp?v=ba831fd5", "v": "ba831fd5"}]}, {"id": "B-01", "caption_body": "病棟にいた頃、休憩60分って書いてあっても、実際に座って食べられたのは10分あるかないかでした。\n美容クリニックに来てから、初めて「休憩ってこういうことだったんだ」って気づいた気がします。\n同じ「休憩60分」の表記でも、中身がこんなに違うんだなって、比べてみて改めて実感しました。", "hashtags": ["#看護師", "#看護師の日常", "#看護師転職"], "music": null, "pinned_comment": null, "date_label": null, "bg": "black", "title": "\"休憩60分\"の意味、病棟と美容でこんなに違った", "ref_label": "参考元: koharunrun8 id7583680657184886034(告発投稿・like108/save19)。差分: 病棟単独の告発形式を「病棟vs美容」左右対比のいらすとや図解に変換、逐語引用なしでみおペルソナの描写に置換。", "batch_label": "Week1 ・ B-01", "status_note": null, "type": "image", "images": [{"url": "media/B-01/01.webp?v=d33be906", "v": "d33be906"}, {"url": "media/B-01/02.webp?v=0f2a541b", "v": "0f2a541b"}, {"url": "media/B-01/03.webp?v=a5f7cffa", "v": "a5f7cffa"}, {"url": "media/B-01/04.webp?v=a3151eae", "v": "a3151eae"}, {"url": "media/B-01/05.webp?v=0217ab53", "v": "0217ab53"}]}, {"id": "C-05", "caption_body": "限界を感じているのに、真っ先に浮かんだのは「辞めます」ではなく、母を悲しませたくないという気持ちでした。\n\n地方の実家から「頑張ってるね」と言われるたびに、しんどいと言えなくなる自分がいました。\nけれど、弱音を吐くのは苦手でした。\n電話越しの母に「大丈夫?」と聞かれるたび、本当は限界に近かったのに「よし、大丈夫。」と自分に言い聞かせて、明るい声で返していました。\n心の中では違うと分かっているのに、その一言がなかなか出てこない。\n本当はしんどい、と言えないまま、誰にも言えない本音だけが胸の奥に溜まっていく感覚がありました。\nそう気づいたんです。誰かの期待より先に、自分の限界を認めてあげないといけないって。\nそれでも、なかなか一歩を踏み出せずにいたんです。\n\n大手の看護師転職サイトに2社登録したものの上手くいかず、美容クリニックを7社受けて7社とも不採用という時期もありました。\nそんな時、友達に紹介してもらった美容特化の転職サイトに半信半疑で登録しました。\n担当の方が親身に話を聞いてくれて、正味3週間ほどで内定。\n\n転職してしばらく経ったある日、実家に帰ると母に「最近、表情が明るくなったね」と言われました。\n「よし、大丈夫。」と自分に言い聞かせる回数が、いつの間にか減っていることに気づいたんです🥹🤍\n心配をかけていた分、少しだけ恩返しできた気がしています。", "hashtags": ["#看護師", "#看護師の日常", "#看護師転職", "#美容看護師", "#看護師あるある"], "music": null, "pinned_comment": null, "date_label": null, "bg": "black", "title": "親の期待とのすれ違い Before/After長文", "ref_label": "参考元: rank1(id7579172163236777223・like71,600/save6,907)+rank7(koharunrun8 id7575081134472711442・like6,394/save541)。差分: 同じBefore/After構造を使い、対比の主役を「親との関係」に置いた新規記述。", "batch_label": "Week1 ・ C-05", "status_note": null, "type": "image", "images": [{"url": "media/C-05/01.webp?v=6501125e", "v": "6501125e"}]}, {"id": "B-02", "caption_body": "病棟にいた頃は、給料日が来ても「今月もこれだけ体を削ったのにな」ってちょっと切なくなってました。\n今は同じ給料日でも、素直に「頑張ってよかった」って思える自分がいます。\n数字そのものより、見た時の気持ちが変わったのが一番大きいかもしれません。", "hashtags": [], "music": null, "pinned_comment": null, "date_label": null, "bg": "black", "title": "手取りを見て、こんなに気持ちが違うなんて", "ref_label": "参考元: biyounurse_tenshoku id7624486645370293522(中位帯投稿・like463/save70)。差分: 手取り21万→40万の言及を抽出、金額をみお固定値(21.6万→37.8万)に置換し給与明細は描かずいらすとや図解に変換。", "batch_label": "Week1 ・ B-02", "status_note": null, "type": "image", "images": [{"url": "media/B-02/01.webp?v=eea49f63", "v": "eea49f63"}, {"url": "media/B-02/02.webp?v=7133bd18", "v": "7133bd18"}, {"url": "media/B-02/03.webp?v=263b1736", "v": "263b1736"}, {"url": "media/B-02/04.webp?v=31846ed7", "v": "31846ed7"}, {"url": "media/B-02/05.webp?v=ecfea4d9", "v": "ecfea4d9"}]}]};</script>

_label": "Week1 ・ C-03", "type": "image", "images": [{"url": "media/C-03/01.webp?v=e47062cb", "v": "e47062cb"}]}, {"id": "C-05", "caption_body": "限界を感じているのに、真っ先に浮かんだのは「辞めます」ではなく、母を悲しませたくないという気持ちでした。\n\n地方の実家から「頑張ってるね」と言われるたびに、しんどいと言えなくなる自分がいました。\n電話越しの母に「大丈夫?」と聞かれるたび、本当は限界に近かったのに「よし、大丈夫。」と自分に言い聞かせて、明るい声で返していました。\n心の中では違うと分かっているのに、その一言がなかなか出てこない。\n本当はしんどい、と言えないまま、誰にも言えない本音だけが胸の奥に溜まっていく感覚がありました。\nそう気づいたんです。誰かの期待より先に、自分の限界を認めてあげないといけないって。\n\n大手の看護師転職サイトに2社登録したものの上手くいかず、美容クリニックを7社受けて7社とも不採用という時期を経て、友達に紹介してもらった美容特化の転職サイトに半信半疑で登録しました。\n担当の方が親身に話を聞いてくれて、正味3週間ほどで内定。\n\n転職してしばらく経ったある日、実家に帰ると母に「最近、表情が明るくなったね」と言われました。\n「よし、大丈夫。」と自分に言い聞かせる回数が、いつの間にか減っていることに気づいたんです🥹🤍\n心配をかけていた分、少しだけ恩返しできた気がしています。", "hashtags": [], "music": null, "pinned_comment": null, "date_label": null, "bg": "black", "title": "親の期待とのすれ違い Before/After長文", "ref_label": null, "batch_label": "Week1 ・ C-05", "type": "image", "images": [{"url": "media/C-05/01.webp?v=d214684a", "v": "d214684a"}]}, {"id": "A-02", "caption_body": "病棟にいた頃は、患者さんのために動くのが仕事だと思ってました。\n今は「ありがとう」を直接もらえる瞬間が増えて、\n同じ\"人のためになる仕事\"でも全然違う手応えなんですよね、正直。", "hashtags": ["#美容看護師", "#看護師の日常", "#看護師転職", "#看護師あるある"], "music": null, "pinned_comment": null, "date_label": null, "bg": "black", "title": "美容クリニックで地味に嬉しかったこと5選(お客様対応編)", "ref_label": null, "batch_label": "Week1 ・ A-02", "type": "image", "images": [{"url": "media/A-02/01.webp?v=5a0e49db", "v": "5a0e49db"}, {"url": "media/A-02/02.webp?v=03782972", "v": "03782972"}, {"url": "media/A-02/03.webp?v=8161e4a1", "v": "8161e4a1"}, {"url": "media/A-02/04.webp?v=410c8663", "v": "410c8663"}, {"url": "media/A-02/05.webp?v=aff035f8", "v": "aff035f8"}, {"url": "media/A-02/06.webp?v=f8bd2a2b", "v": "f8bd2a2b"}]}]};</script>
